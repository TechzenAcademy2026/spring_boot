# =================================================================
# Datasource: @DynamicPropertySource se inject URL/username/password
# tu PostgreSQL container (Testcontainers) luc runtime.
# =================================================================
# Khong can khai bao spring.datasource.* o day.

# Flyway DUOC PHEP CHAY trong test:
# - Container la PostgreSQL that nen Flyway script chay duoc binh thuong
# - Flyway se tao schema + insert seed data (V1.0.0 -> V1.0.8)
# - Tests su dung chinh seed data nay (khong can tao dummy data thu cong)
# - NOTE: spring.flyway.url/user/password se duoc @DynamicPropertySource OVERRIDE
spring.flyway.enabled=true

# show-sql: In cac cau SQL ra console de debug test de hon
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tat Spring Security: khong can xac thuc khi test service
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# JwtUtil la @Component co @Value("${jwt.secret-key}") va @Value("${jwt.expiration-ms}").
# Du Security bi tat, Spring van tao bean JwtUtil va can resolve cac placeholder nay.
# -> Khai bao gia tri dummy de context khoi dong duoc trong test.
jwt.secret-key=test-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
jwt.expiration-ms=3600000
